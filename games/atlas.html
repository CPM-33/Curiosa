<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Atlas Showdown — Curiosa</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cinzel:wght@500;600;700&family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/shared.css">
<style>
  .stage{max-width:560px}
  .phead{display:flex;justify-content:space-between;align-items:center;font-family:'Cinzel',serif;font-size:.72rem;letter-spacing:.12em;margin-bottom:18px}
  .phead b{color:var(--oxblood)}.phead .b b{color:var(--verdigris)}
  .duel{display:grid;gap:14px}
  .known{background:rgba(53,107,94,.12);border:1px solid var(--verdigris);border-radius:4px;padding:18px;text-align:center}
  .chall{background:rgba(255,250,238,.55);border:1px solid var(--line);border-radius:4px;padding:18px;text-align:center}
  .cname{font-family:'Cinzel',serif;font-size:1.4rem;letter-spacing:.02em;line-height:1.2}
  html[lang="ar"] .cname{font-family:'Amiri',serif;letter-spacing:0;font-size:1.6rem}
  .clabel{font-family:'Cinzel',serif;font-size:.6rem;letter-spacing:.2em;text-transform:uppercase;color:var(--ink-soft);margin-bottom:6px}
  html[lang="ar"] .clabel{font-family:'Amiri',serif;letter-spacing:0;font-size:.8rem}
  .area{font-family:'Cinzel',serif;font-size:1.1rem;color:var(--verdigris);margin-top:6px}
  .area small{font-size:.7rem;color:var(--ink-soft)}
  .q{text-align:center;font-style:italic;color:var(--ink-soft);margin:6px 0 2px;font-size:1.05rem}
  .choices{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:6px}
  .choice{cursor:pointer;font-family:'Cinzel',serif;font-size:.9rem;letter-spacing:.06em;padding:16px;border:1px solid var(--line);border-radius:3px;background:rgba(255,250,238,.6);color:var(--ink);transition:transform .14s,background .14s,border-color .14s;display:flex;align-items:center;justify-content:center;gap:8px}
  html[lang="ar"] .choice{font-family:'Amiri',serif;letter-spacing:0;font-size:1.05rem}
  .choice:hover{transform:translateY(-2px);background:rgba(255,250,238,.95);border-color:var(--gold)}
  .choice .ar{font-size:1.3rem;color:var(--oxblood)}
  .reveal{text-align:center;margin-top:8px}
  .verdict{font-family:'Cinzel',serif;letter-spacing:.14em;text-transform:uppercase;font-size:.82rem;margin-bottom:8px}
  .verdict.good{color:var(--verdigris)}.verdict.bad{color:var(--oxblood)}
  .res-title{font-family:'Cinzel',serif;font-size:.72rem;letter-spacing:.3em;text-transform:uppercase;color:var(--ink-soft);text-align:center;margin-bottom:8px}
  .rank{font-family:'Cinzel',serif;font-weight:700;text-align:center;font-size:clamp(1.6rem,5vw,2.3rem);color:var(--oxblood)}
  html[lang="ar"] .rank,html[lang="ar"] .res-title{font-family:'Amiri',serif;letter-spacing:0}
  .scorebig{text-align:center;margin:18px 0 4px;font-size:3rem;font-family:'Cinzel',serif}.scorebig small{font-size:1.1rem;color:var(--ink-soft)}
  .res-sub{text-align:center;font-style:italic;color:var(--ink-soft);font-size:1.02rem;max-width:400px;margin:6px auto 22px;line-height:1.5}
  .res-actions{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
  .newbest{text-align:center;color:var(--verdigris);font-family:'Cinzel',serif;letter-spacing:.1em;font-size:.78rem;margin-bottom:8px}
</style>
</head>
<body>
<div id="site-header"></div>
<div class="gamewrap"><div class="stage">
  <span class="corner tl"></span><span class="corner tr"></span><span class="corner bl"></span><span class="corner br"></span>
  <div id="app"></div>
</div></div>
<script src="../assets/strings.js"></script>
<script>window.CURIOSA_ROOT="../";</script>
<script src="../assets/core.js"></script>
<script>

  gameOver:{en:"Duel Over",fr:"Duel terminé",ar:"انتهت المبارزة"},

    {min:10,t:{en:"Master Navigator",fr:"Maître Navigateur",ar:"ملّاح بارع"},d:{en:"A formidable sense of scale.",fr:"Un remarquable sens des proportions.",ar:"حسٌّ بارعٌ للمساحات."}},
    {min:6,t:{en:"Seasoned Explorer",fr:"Explorateur Aguerri",ar:"مستكشِف متمرّس"},d:{en:"The map is taking shape.",fr:"La carte se dessine.",ar:"بدأت الخريطة تتّضح."}},
    {min:3,t:{en:"Wandering Apprentice",fr:"Apprenti Voyageur",ar:"متدرّب جوّال"},d:{en:"A few more journeys to go.",fr:"Encore quelques voyages.",ar:"بقيت بضع رحلات."}},
    {min:0,t:{en:"Fresh Recruit",fr:"Nouvelle Recrue",ar:"مستجِدّ"},d:{en:"Every cartographer starts somewhere.",fr:"Tout cartographe débute quelque part.",ar:"كلّ رسّام خرائط يبدأ من مكان."}}
  ]
};
var C=[
 {a:17098242,n:{en:"Russia",fr:"Russie",ar:"روسيا"}},
 {a:9984670,n:{en:"Canada",fr:"Canada",ar:"كندا"}},
 {a:9833517,n:{en:"United States",fr:"États-Unis",ar:"الولايات المتحدة"}},

];
var app=document.getElementById('app'),st=null;
function fmt(n){return n.toLocaleString(L()==='ar'?'ar-EG':(L()==='fr'?'fr-FR':'en-US'));}
function pick(ex){var i;do{i=Math.floor(Math.random()*C.length);}while(ex&&C[i]===ex);return C[i];}
function home(){st=null;var best=(Curiosa.getScores().atlas||{}).best||0;
  app.innerHTML='<div class="view"><div class="eyebrow">'+tr(G.duel)+'</div><div class="gtitle">'+t("g_atlas")+'</div>'+
   '<div class="rule"><span class="ln"></span><span class="dot">✦</span><span class="ln"></span></div>'+
   '<p class="tagline">'+tr(G.intro)+'</p>'+
   '<div class="center"><button class="btn" id="go">'+tr(G.begin)+'</button></div>'+
   (best?'<p class="center" style="margin-top:16px;font-family:Cinzel;font-size:.72rem;letter-spacing:.1em;color:var(--ink-soft)">'+tr(G.best)+': '+best+'</p>':'')+
   '<a class="backlink" href="../index.html">← '+t("back")+'</a></div>';
  app.querySelector('#go').onclick=startGame;}
function startGame(){st={score:0,known:pick(),chall:null};st.chall=pick(st.known);round();}
function round(){var best=(Curiosa.getScores().atlas||{}).best||0;
  app.innerHTML='<div class="view"><div class="phead"><span>'+tr(G.chain)+' <b>'+st.score+'</b></span><span class="b">'+tr(G.best)+' <b>'+Math.max(best,st.score)+'</b></span></div>'+
   '<div class="duel"><div class="known"><div class="clabel">'+tr(G.knownLabel)+'</div><div class="cname">'+tr(st.known.n)+'</div>'+
     '<div class="area">'+fmt(st.known.a)+' <small>'+tr(G.sqkm)+'</small></div></div>'+
   '<div class="chall"><div class="clabel">'+tr(G.challLabel)+'</div><div class="cname">'+tr(st.chall.n)+'</div>'+
     '<div class="q">'+tr(G.question)+'</div>'+
     '<div class="choices"><button class="choice" data-g="larger"><span class="ar">▲</span>'+tr(G.larger)+'</button>'+
       '<button class="choice" data-g="smaller"><span class="ar">▼</span>'+tr(G.smaller)+'</button></div></div></div>'+
   '<a class="backlink" href="../index.html">← '+t("back")+'</a></div>';
  app.querySelectorAll('.choice').forEach(function(b){b.onclick=function(){guess(b.dataset.g);};});}
function guess(g){
  var bigger=st.chall.a>st.known.a;var correct=(g==='larger'&&bigger)||(g==='smaller'&&!bigger);
  app.querySelectorAll('.choice').forEach(function(b){b.disabled=true;b.style.opacity=.5;});
  var chall=app.querySelector('.chall');
  chall.insertAdjacentHTML('beforeend','<div class="area" style="margin-top:10px">'+fmt(st.chall.a)+' <small>'+tr(G.sqkm)+'</small></div>'+
    '<div class="reveal"><div class="verdict '+(correct?'good':'bad')+'">'+(correct?tr(G.correct):tr(G.over))+'</div></div>');
  if(correct){st.score++;st.known=st.chall;st.chall=pick(st.known);
    setTimeout(round,850);}
  else setTimeout(results,1100);}
function results(){var r=G.ranks.find(function(x){return st.score>=x.min;});
  var isBest=Curiosa.saveScore('atlas',st.score);
  app.innerHTML='<div class="view"><div class="res-title">'+tr(G.gameOver)+'</div>'+
   (isBest?'<div class="newbest">'+t("newBest")+'</div>':'')+
   '<div class="rank">'+tr(r.t)+'</div><div class="scorebig">'+st.score+'<small> '+t("unit_chain")+'</small></div>'+
   '<p class="res-sub">'+tr(r.d)+'</p>'+
   '<div class="res-actions"><button class="btn" id="again">'+t("playAgain")+'</button><button class="btn ghost" id="menu">'+t("mainGate")+'</button></div>'+
   '<a class="backlink" href="../index.html">← '+t("back")+'</a></div>';
  app.querySelector('#again').onclick=startGame;app.querySelector('#menu').onclick=home;}
home();
</script>
</body>
</html>
