<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Trivia Expedition — Curiosa</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cinzel:wght@500;600;700&family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/shared.css">
<style>
  .cards{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}
  .card{cursor:pointer;text-align:start;background:rgba(255,250,238,.55);border:1px solid var(--line);border-radius:3px;padding:16px;transition:transform .18s,box-shadow .18s,background .18s;display:flex;gap:12px;align-items:flex-start}
  .card:hover{transform:translateY(-3px);box-shadow:0 12px 22px -12px var(--shadow);background:rgba(255,250,238,.92)}
  .card .ic{width:34px;height:34px;flex:none;color:var(--oxblood)}
  .card.geo .ic{color:var(--verdigris)}.card.hist .ic{color:var(--gold)}.card.mix .ic{color:var(--ink-soft)}
  .card h3{font-family:'Cinzel',serif;font-size:1rem;letter-spacing:.03em}
  html[lang="ar"] .card h3{font-family:'Amiri',serif;letter-spacing:0;font-size:1.15rem}
  .qhead{display:flex;justify-content:space-between;align-items:center}
  .qmeta{font-family:'Cinzel',serif;font-size:.66rem;letter-spacing:.18em;text-transform:uppercase;color:var(--ink-soft)}
  html[lang="ar"] .qmeta{font-family:'Amiri',serif;letter-spacing:0;font-size:.85rem}
  .scoreline{display:flex;gap:16px;font-family:'Cinzel',serif;font-size:.72rem;letter-spacing:.1em}
  .scoreline b{color:var(--oxblood)}.scoreline .st b{color:var(--verdigris)}
  .bar{height:6px;background:rgba(120,96,52,.18);border-radius:6px;overflow:hidden;margin:14px 0 24px}
  .bar>i{display:block;height:100%;background:linear-gradient(90deg,var(--gold),var(--oxblood));border-radius:6px;transition:width .45s}
  .qtext{font-size:1.42rem;line-height:1.4;margin-bottom:22px;min-height:2em}
  .opts{display:grid;gap:10px}
  .opt{cursor:pointer;text-align:start;font-size:1.06rem;background:rgba(255,250,238,.55);border:1px solid var(--line);border-radius:3px;padding:13px 15px;color:var(--ink);display:flex;gap:12px;align-items:center;transition:transform .12s,background .14s,border-color .14s}
  .opt .key{font-family:'Cinzel',serif;font-size:.76rem;width:25px;height:25px;flex:none;border:1px solid var(--line);border-radius:50%;display:grid;place-items:center;color:var(--ink-soft)}
  .opt:not(.locked):hover{background:rgba(255,250,238,.95);transform:translateX(3px);border-color:var(--gold)}
  html[dir="rtl"] .opt:not(.locked):hover{transform:translateX(-3px)}
  .opt.correct{background:rgba(53,107,94,.16);border-color:var(--verdigris)}.opt.correct .key{background:var(--verdigris);color:#fff;border-color:var(--verdigris)}
  .opt.wrong{background:rgba(156,61,40,.13);border-color:var(--oxblood)}.opt.wrong .key{background:var(--oxblood);color:#fff;border-color:var(--oxblood)}
  .opt.dim{opacity:.55}.opt.locked{cursor:default}
  .feedback{margin-top:20px;border-top:1px dashed var(--line);padding-top:16px;opacity:0;max-height:0;overflow:hidden;transition:opacity .35s}
  .feedback.show{opacity:1;max-height:420px}
  .verdict{font-family:'Cinzel',serif;letter-spacing:.14em;text-transform:uppercase;font-size:.78rem;margin-bottom:6px}
  .verdict.good{color:var(--verdigris)}.verdict.bad{color:var(--oxblood)}
  .explain{font-size:1.02rem;line-height:1.55;font-style:italic}
  .nextrow{display:flex;justify-content:flex-end;margin-top:16px}
  .res-title{font-family:'Cinzel',serif;font-size:.7rem;letter-spacing:.3em;text-transform:uppercase;color:var(--ink-soft);text-align:center;margin-bottom:8px}
  .rank{font-family:'Cinzel',serif;font-weight:700;text-align:center;font-size:clamp(1.7rem,5vw,2.4rem);color:var(--oxblood)}
  html[lang="ar"] .rank,html[lang="ar"] .res-title,html[lang="ar"] .qmeta{font-family:'Amiri',serif;letter-spacing:0}
  .scorebig{text-align:center;margin:18px 0 4px;font-size:3.1rem;font-family:'Cinzel',serif}.scorebig small{font-size:1.2rem;color:var(--ink-soft)}
  .res-sub{text-align:center;font-style:italic;color:var(--ink-soft);font-size:1.04rem;max-width:420px;margin:6px auto 22px;line-height:1.5}
  .res-actions{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
  .newbest{text-align:center;color:var(--verdigris);font-family:'Cinzel',serif;letter-spacing:.1em;font-size:.78rem;margin-bottom:8px}
  @media(max-width:560px){.cards{grid-template-columns:1fr}.qtext{font-size:1.24rem}}
</style>
</head>

    {min:.3, t:{en:"Curious Apprentice",fr:"Apprenti Curieux",ar:"متدرّب فضولي"}, d:{en:"The expedition has begun.",fr:"L'expédition a commencé.",ar:"بدأت الرحلة للتو."}},

var BANK={
 math:[
  {q:{en:"What is the value of 0! (zero factorial)?",fr:"Quelle est la valeur de 0! (factorielle de zéro) ?",ar:"ما قيمة ‎0!‎ (مضروب الصفر)؟"},
   a:[{en:"1",fr:"1",ar:"١"},{en:"0",fr:"0",ar:"٠"},{en:"Undefined",fr:"Indéfini",ar:"غير معرّف"},{en:"Infinity",fr:"Infini",ar:"لا نهاية"}],
   e:{en:"By convention 0! = 1 — the 'empty product', which keeps formulas for combinations consistent.",fr:"Par convention 0! = 1 — le « produit vide », qui rend cohérentes les formules de combinaisons.",ar:"اصطلاحًا ‎0! = 1‎ — وهو «الجداء الفارغ» الذي يبقي صيغ التوافيق متّسقة."}},
  {q:{en:"The interior angles of a hexagon sum to how many degrees?",fr:"La somme des angles intérieurs d'un hexagone vaut combien de degrés ?",ar:"كم مجموع الزوايا الداخلية للشكل السداسي بالدرجات؟"},
   a:[{en:"720°",fr:"720°",ar:"٧٢٠°"},{en:"540°",fr:"540°",ar:"٥٤٠°"},{en:"640°",fr:"640°",ar:"٦٤٠°"},{en:"900°",fr:"900°",ar:"٩٠٠°"}],
   e:{en:"Use (n−2)×180°. For six sides: 4×180° = 720°.",fr:"On applique (n−2)×180°. Pour six côtés : 4×180° = 720°.",ar:"نستخدم ‎(n−2)×180°‎. لستة أضلاع: ‎4×180° = 720°‎."}},
  {q:{en:"Rolling two dice, what is the probability the sum is 7?",fr:"En lançant deux dés, quelle est la probabilité d'obtenir 7 ?",ar:"عند رمي نردين، ما احتمال أن يكون المجموع ٧؟"},
   a:[{en:"1/6",fr:"1/6",ar:"١/٦"},{en:"1/8",fr:"1/8",ar:"١/٨"},{en:"1/12",fr:"1/12",ar:"١/١٢"},{en:"5/36",fr:"5/36",ar:"٥/٣٦"}],
   e:{en:"Six of the 36 outcomes sum to 7, so 6/36 = 1/6 — the most likely total.",fr:"Six des 36 résultats donnent 7, soit 6/36 = 1/6 — le total le plus probable.",ar:"ستة من ٣٦ ناتجًا مجموعها ٧، أي ‎6/36 = 1/6‎ — وهو الأكثر احتمالًا."}},
  {q:{en:"What is the derivative of sin(x)?",fr:"Quelle est la dérivée de sin(x) ?",ar:"ما مشتقة الدالة جا(س) [sin(x)]؟"},

   e:{en:"d/dx[sin x] = cos x; differentiating cycles every four steps.",fr:"d/dx[sin x] = cos x ; la dérivation revient au point de départ tous les quatre pas.",ar:"مشتقة جا(س) هي جتا(س)، وتتكرّر الدورة كل أربع خطوات."}},
  {q:{en:"Which kind of number is the square root of 2?",fr:"Quel type de nombre est la racine carrée de 2 ?",ar:"أيُّ نوعٍ من الأعداد هو الجذر التربيعي للعدد ٢؟"},
   a:[{en:"Irrational",fr:"Irrationnel",ar:"عدد غير نسبي (أصمّ)"},{en:"Rational",fr:"Rationnel",ar:"عدد نسبي"},{en:"Imaginary",fr:"Imaginaire",ar:"عدد تخيّلي"},{en:"Integer",fr:"Entier",ar:"عدد صحيح"}],
   e:{en:"√2 ≈ 1.414… cannot be written as a ratio of integers — the classic irrational number.",fr:"√2 ≈ 1,414… ne peut s'écrire comme rapport d'entiers — l'exemple classique d'irrationnel.",ar:"الجذر التربيعي لـ٢ ≈ ١٫٤١٤، ولا يمكن كتابته كنسبة بين عددين صحيحين — وهو المثال الكلاسيكي للعدد الأصمّ."}},
  {q:{en:"In a normal distribution, about what share of data lies within one standard deviation of the mean?",fr:"Dans une loi normale, quelle proportion des données se trouve à un écart-type de la moyenne ?",ar:"في التوزيع الطبيعي، ما النسبة التقريبية للبيانات ضمن انحرافٍ معياريٍّ واحدٍ عن المتوسط؟"},

  {q:{en:"What is 2 raised to the 10th power (2¹⁰)?",fr:"Combien vaut 2 puissance 10 (2¹⁰) ?",ar:"كم يساوي ٢ مرفوعًا للأس ١٠ (‎2¹⁰‎)؟"},
   a:[{en:"1024",fr:"1024",ar:"١٠٢٤"},{en:"512",fr:"512",ar:"٥١٢"},{en:"2048",fr:"2048",ar:"٢٠٤٨"},{en:"1000",fr:"1000",ar:"١٠٠٠"}],
   e:{en:"2¹⁰ = 1024 — why a 'kilobyte' is often 1024 bytes.",fr:"2¹⁰ = 1024 — d'où un « kilo-octet » de 1024 octets.",ar:"‎2¹⁰ = 1024‎ — ولهذا يُعدّ «الكيلوبايت» غالبًا ١٠٢٤ بايت."}},
  {q:{en:"What is the approximate value of Euler's number, e?",fr:"Quelle est la valeur approximative du nombre d'Euler, e ?",ar:"ما القيمة التقريبية لعدد أويلر (e)؟"},
   a:[{en:"2.718",fr:"2,718",ar:"٢٫٧١٨"},{en:"3.142",fr:"3,142",ar:"٣٫١٤٢"},{en:"1.618",fr:"1,618",ar:"١٫٦١٨"},{en:"1.414",fr:"1,414",ar:"١٫٤١٤"}],
   e:{en:"e ≈ 2.718, the base of natural logarithms. (3.142 is π.)",fr:"e ≈ 2,718, la base des logarithmes naturels. (3,142 ≈ π.)",ar:"‎e ≈ 2.718‎ وهو أساس اللوغاريتمات الطبيعية. (و٣٫١٤٢ هو باي.)"}},
  {q:{en:"How many edges does a cube have?",fr:"Combien d'arêtes possède un cube ?",ar:"كم عدد أحرف (حواف) المكعّب؟"},
   a:[{en:"12",fr:"12",ar:"١٢"},{en:"8",fr:"8",ar:"٨"},{en:"6",fr:"6",ar:"٦"},{en:"16",fr:"16",ar:"١٦"}],
   e:{en:"A cube has 6 faces, 8 vertices and 12 edges (V−E+F = 2).",fr:"Un cube a 6 faces, 8 sommets et 12 arêtes (S−A+F = 2).",ar:"للمكعّب ٦ أوجه و٨ رؤوس و١٢ حرفًا (‎V−E+F = 2‎)."}},
  {q:{en:"What is log₁₀(1000)?",fr:"Combien vaut log₁₀(1000) ?",ar:"كم يساوي ‎log₁₀(1000)‎؟"},
   a:[{en:"3",fr:"3",ar:"٣"},{en:"2",fr:"2",ar:"٢"},{en:"4",fr:"4",ar:"٤"},{en:"10",fr:"10",ar:"١٠"}],
   e:{en:"Ten to what power gives 1000? 10³ = 1000, so 3.",fr:"Dix à quelle puissance donne 1000 ? 10³ = 1000, donc 3.",ar:"عشرة لأيّ أُسٍّ تعطي ١٠٠٠؟ ‎10³ = 1000‎، فالجواب ٣."}}
 ],
 geo:[
  {q:{en:"What is the capital of Australia?",fr:"Quelle est la capitale de l'Australie ?",ar:"ما عاصمة أستراليا؟"},
   a:[{en:"Canberra",fr:"Canberra",ar:"كانبرا"},{en:"Sydney",fr:"Sydney",ar:"سيدني"},{en:"Melbourne",fr:"Melbourne",ar:"ملبورن"},{en:"Perth",fr:"Perth",ar:"بيرث"}],
   e:{en:"Canberra was built as a compromise capital between Sydney and Melbourne.",fr:"Canberra fut bâtie comme capitale de compromis entre Sydney et Melbourne.",ar:"بُنيت كانبرا عاصمةً توافقيةً بين سيدني وملبورن."}},
  {q:{en:"What is the capital of New Zealand?",fr:"Quelle est la capitale de la Nouvelle-Zélande ?",ar:"ما عاصمة نيوزيلندا؟"},
   a:[{en:"Wellington",fr:"Wellington",ar:"ويلينغتون"},{en:"Auckland",fr:"Auckland",ar:"أوكلاند"},{en:"Christchurch",fr:"Christchurch",ar:"كرايستشيرش"},{en:"Hamilton",fr:"Hamilton",ar:"هاملتون"}],
   e:{en:"Wellington is the capital, though Auckland is the larger city.",fr:"Wellington est la capitale, bien qu'Auckland soit la plus grande ville.",ar:"ويلينغتون هي العاصمة، رغم أنّ أوكلاند أكبر مدينة."}},
  {q:{en:"Which is the smallest country in the world by area?",fr:"Quel est le plus petit pays du monde par sa superficie ?",ar:"ما أصغر دولة في العالم من حيث المساحة؟"},
   a:[{en:"Vatican City",fr:"Le Vatican",ar:"مدينة الفاتيكان"},{en:"Monaco",fr:"Monaco",ar:"موناكو"},{en:"Nauru",fr:"Nauru",ar:"ناورو"},{en:"San Marino",fr:"Saint-Marin",ar:"سان مارينو"}],

  {q:{en:"In which country is Mount Kilimanjaro?",fr:"Dans quel pays se trouve le Kilimandjaro ?",ar:"في أيّ دولة يقع جبل كليمنجارو؟"},
   a:[{en:"Tanzania",fr:"Tanzanie",ar:"تنزانيا"},{en:"Kenya",fr:"Kenya",ar:"كينيا"},{en:"Ethiopia",fr:"Éthiopie",ar:"إثيوبيا"},{en:"Uganda",fr:"Ouganda",ar:"أوغندا"}],
   e:{en:"Kilimanjaro (~5,895 m) rises in northeastern Tanzania.",fr:"Le Kilimandjaro (~5 895 m) s'élève au nord-est de la Tanzanie.",ar:"يرتفع كليمنجارو (نحو ٥٨٩٥ م) في شمال شرق تنزانيا."}},
  {q:{en:"The Strait of Gibraltar links the Mediterranean to which body of water?",fr:"Le détroit de Gibraltar relie la Méditerranée à quelle étendue d'eau ?",ar:"يصل مضيق جبل طارق البحر المتوسط بأيّ مسطّح مائي؟"},

  {q:{en:"In which country is Lake Baikal, the world's deepest lake?",fr:"Dans quel pays se trouve le lac Baïkal, le plus profond du monde ?",ar:"في أيّ دولة تقع بحيرة بايكال، أعمق بحيرة في العالم؟"},

  {q:{en:"On which continent is the Sahara Desert?",fr:"Sur quel continent se trouve le Sahara ?",ar:"في أيّ قارّة تقع الصحراء الكبرى؟"},

var PER=10, app=document.getElementById('app'), st=null;
function shuffle(a){a=a.slice();for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var x=a[i];a[i]=a[j];a[j]=x;}return a;}

function home(){
  st=null;
  var subj=[
    {m:'math',c:'math',ic:'<svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"><path d="M4 6h16M4 6l6 6-6 6h16"/></svg>',name:G.math,d:G.dmath},
    {m:'geo',c:'geo',ic:'<svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4"><circle cx="12" cy="12" r="9"/><path d="M12 3v18M3 12h18M5.5 6.5c3 2 10 2 13 0M5.5 17.5c3-2 10-2 13 0" stroke-width="1"/></svg>',name:G.geo,d:G.dgeo},
    {m:'hist',c:'hist',ic:'<svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"><path d="M4 21h16M6 21V9l6-5 6 5v12M9.5 21v-5h5v5"/></svg>',name:G.hist,d:G.dhist},
    {m:'mix',c:'mix',ic:'<svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"><path d="M12 2v3M12 19v3M2 12h3M19 12h3M5 5l2 2M17 17l2 2M19 5l-2 2M7 17l-2 2"/><circle cx="12" cy="12" r="4"/></svg>',name:G.grand,d:G.dgrand}
  ];
  app.innerHTML='<div class="view"><div class="eyebrow">'+tr(G.expedition)+'</div>'+
    '<div class="gtitle">'+t("g_trivia")+'</div>'+
    '<div class="rule"><span class="ln"></span><span class="dot">✦</span><span class="ln"></span></div>'+
    '<p class="tagline">'+tr(G.intro)+'</p>'+
    '<div class="eyebrow" style="margin-bottom:14px">'+tr(G.pick)+'</div>'+
    '<div class="cards">'+subj.map(function(s){return '<button class="card '+s.c+'" data-m="'+s.m+'">'+s.ic+'<div><h3>'+tr(s.name)+'</h3><p style="font-style:italic;color:var(--ink-soft);font-size:.9rem;margin-top:2px">'+tr(s.d)+'</p></div></button>';}).join('')+'</div>'+
    '<a class="backlink" href="../index.html">← '+t("back")+'</a></div>';
  app.querySelectorAll('.card').forEach(function(c){c.onclick=function(){startRound(c.dataset.m);};});
}
function startRound(mode){
  var pool=[];
  if(mode==='mix'){['math','geo','hist'].forEach(function(k){BANK[k].forEach(function(q){pool.push(q);});});}
  else BANK[mode].forEach(function(q){pool.push(q);});
  var chosen=shuffle(pool).slice(0,Math.min(PER,pool.length)).map(function(q){
    var correct=q.a[0];
    return {q:q.q,e:q.e,opts:shuffle(q.a),correct:correct};
  });
  st={qs:chosen,idx:0,score:0,streak:0,answered:false,mode:mode};
  renderQ();
}
function renderQ(){
  var s=st,item=s.qs[s.idx],n=s.idx+1,total=s.qs.length;
  app.innerHTML='<div class="view"><div class="qhead"><span class="qmeta">'+tr(G.question)+' '+n+' / '+total+'</span>'+
    '<span class="scoreline"><span>'+t("score")+' <b>'+s.score+'</b></span><span class="st">'+t("streak")+' <b>'+s.streak+'</b></span></span></div>'+
    '<div class="bar"><i style="width:'+((n-1)/total*100)+'%"></i></div>'+
    '<div class="qtext">'+tr(item.q)+'</div><div class="opts" id="opts"></div>'+
    '<div class="feedback" id="fb"><div class="verdict" id="vd"></div><div class="explain" id="ex"></div>'+
    '<div class="nextrow"><button class="btn" id="next">'+(n<total?t("next"):t("seeResults"))+'</button></div></div>'+
    '<a class="backlink" href="../index.html">← '+t("back")+'</a></div>';
  var wrap=app.querySelector('#opts'),keys=['A','B','C','D'];
  item.opts.forEach(function(o,i){var b=document.createElement('button');b.className='opt';
    b.innerHTML='<span class="key">'+keys[i]+'</span><span>'+tr(o)+'</span>';b.onclick=function(){choose(o,b);};wrap.appendChild(b);});
  app.querySelector('#next').onclick=advance;
}
function choose(o,btn){
  if(st.answered)return;st.answered=true;
  var item=st.qs[st.idx],correct=(o===item.correct);
  app.querySelectorAll('.opt').forEach(function(b){b.classList.add('locked');
    var span=b.querySelector('span:last-child').textContent;
    if(span===tr(item.correct))b.classList.add('correct');else if(b===btn)b.classList.add('wrong');else b.classList.add('dim');});
  if(correct){st.score++;st.streak++;}else st.streak=0;
  var vd=app.querySelector('#vd');vd.textContent=correct?t("correct"):t("notQuite");vd.className='verdict '+(correct?'good':'bad');
  app.querySelector('#ex').textContent=tr(item.e);
  app.querySelector('#fb').classList.add('show');
  app.querySelector('.scoreline').innerHTML='<span>'+t("score")+' <b>'+st.score+'</b></span><span class="st">'+t("streak")+' <b>'+st.streak+'</b></span>';
}
function advance(){if(st.idx<st.qs.length-1){st.idx++;st.answered=false;renderQ();}else results();}
function results(){
  var total=st.qs.length,pct=st.score/total,r=G.ranks.find(function(x){return pct>=x.min;});
  var isBest=Curiosa.saveScore('trivia',st.score);
  app.innerHTML='<div class="view"><div class="res-title">'+tr({en:"Expedition Complete",fr:"Expédition terminée",ar:"اكتملت الرحلة"})+'</div>'+
    (isBest?'<div class="newbest">'+t("newBest")+'</div>':'')+
    '<div class="rank">'+tr(r.t)+'</div><div class="scorebig">'+st.score+'<small> / '+total+'</small></div>'+
    '<p class="res-sub">'+tr(r.d)+'</p>'+
    '<div class="res-actions"><button class="btn" id="again">'+t("playAgain")+'</button><button class="btn ghost" id="menu">'+tr({en:"Change Field",fr:"Changer de domaine",ar:"غيّر المجال"})+'</button></div>'+
    '<a class="backlink" href="../index.html">← '+t("back")+'</a></div>';
  app.querySelector('#again').onclick=function(){startRound(st.mode);};
  app.querySelector('#menu').onclick=home;
}
home();
</script>
