<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mental Arithmetic — Curiosa</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cinzel:wght@500;600;700&family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/shared.css">
<style>
  .stage{max-width:560px}
  .levels{display:grid;gap:12px}
  .lvl{cursor:pointer;text-align:start;background:rgba(255,250,238,.55);border:1px solid var(--line);border-radius:3px;padding:16px 18px;transition:transform .16s,background .16s,border-color .16s;display:flex;justify-content:space-between;align-items:center}
  .lvl:hover{transform:translateX(3px);background:rgba(255,250,238,.95);border-color:var(--gold)}
  html[dir="rtl"] .lvl:hover{transform:translateX(-3px)}
  .lvl h3{font-family:'Cinzel',serif;font-size:1rem;letter-spacing:.03em}
  html[lang="ar"] .lvl h3{font-family:'Amiri',serif;letter-spacing:0;font-size:1.18rem}
  .lvl p{font-size:.92rem;color:var(--ink-soft);font-style:italic;margin-top:2px}
  .lvl .ar{font-family:'Cinzel',serif;color:var(--oxblood)}
  .phead{display:flex;justify-content:space-between;align-items:center;font-family:'Cinzel',serif;font-size:.72rem;letter-spacing:.12em}
  .phead b{color:var(--oxblood)}.phead .t b{color:var(--verdigris)}
  .bar{height:6px;background:rgba(120,96,52,.18);border-radius:6px;overflow:hidden;margin:14px 0 22px}
  .bar>i{display:block;height:100%;background:linear-gradient(90deg,var(--verdigris),var(--gold));border-radius:6px;transition:width 1s linear}
  .problem{text-align:center;font-family:'Cinzel',serif;font-size:clamp(2.4rem,9vw,3.4rem);letter-spacing:.04em;margin:8px 0 18px}
  .answer{width:100%;text-align:center;font-family:'Cinzel',serif;font-size:2rem;background:rgba(255,250,238,.7);border:1px solid var(--line);border-radius:3px;padding:12px;outline:none;color:var(--ink)}
  .answer.flash-ok{border-color:var(--verdigris);background:rgba(53,107,94,.16)}
  .pad{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:14px}
  .pad button{font-family:'Cinzel',serif;font-size:1.2rem;padding:14px;background:rgba(255,250,238,.6);border:1px solid var(--line);border-radius:3px;cursor:pointer;color:var(--ink)}
  .pad button:hover{background:rgba(255,250,238,.95)}.pad button.act{background:var(--ink);color:var(--parch1)}
  .res-title{font-family:'Cinzel',serif;font-size:.72rem;letter-spacing:.3em;text-transform:uppercase;color:var(--ink-soft);text-align:center;margin-bottom:8px}
  .rank{font-family:'Cinzel',serif;font-weight:700;text-align:center;font-size:clamp(1.6rem,5vw,2.3rem);color:var(--oxblood)}
  html[lang="ar"] .rank,html[lang="ar"] .res-title{font-family:'Amiri',serif;letter-spacing:0}
  .scorebig{text-align:center;margin:18px 0 4px;font-size:3rem;font-family:'Cinzel',serif}.scorebig small{font-size:1.1rem;color:var(--ink-soft)}
  .res-sub{text-align:center;font-style:italic;color:var(--ink-soft);font-size:1.02rem;max-width:380px;margin:6px auto 22px;line-height:1.5}
  .res-actions{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
  .newbest{text-align:center;color:var(--verdigris);font-family:'Cinzel',serif;letter-spacing:.1em;font-size:.78rem;margin-bottom:8px}
</style>
</head>
<body>
<div id="site-header"></div>
<div class="gamewrap"><div class="stage">
  <span class="corner tl"></span><span class="corner tr"></span><span class="corner bl"></span><span class="corner br"></span>
  <div id="app"></div>
</div></div>
<script src="../assets/strings.js"></script>
<script>window.CURIOSA_ROOT="../";</script>
<script src="../assets/core.js"></script>
<script>
var t=Curiosa.t,L=Curiosa.lang;function tr(o){return o[L()]||o.en;}
var G={
  sprint:{en:"A Sixty-Second Sprint",fr:"Un Sprint de Soixante Secondes",ar:"سباق ستّين ثانية"},
  intro:{en:"Solve as many as you can before the sand runs out. Correct answers submit on their own.",fr:"Résolvez-en le plus possible avant la fin du sable. Les bonnes réponses se valident seules.",ar:"حُلَّ أكبر عددٍ ممكن قبل نفاد الوقت. الإجابات الصحيحة تُحتسب تلقائيًا."},
  choose:{en:"Choose Your Tier",fr:"Choisissez votre niveau",ar:"اختر مستواك"},
  l1:{en:"Apprentice",fr:"Apprenti",ar:"مبتدئ"},
  l2:{en:"Adept",fr:"Adepte",ar:"متمكّن"},
  l3:{en:"Master",fr:"Maître",ar:"خبير"},
  d1:{en:"Addition, subtraction, simple tables.",fr:"Addition, soustraction, tables simples.",ar:"جمع وطرح وجداول بسيطة."},
  d2:{en:"Bigger sums, multiplication & clean division.",fr:"Sommes plus grandes, multiplication et division nette.",ar:"أعداد أكبر وضرب وقسمة دقيقة."},
  d3:{en:"Two-digit products and hefty figures.",fr:"Produits à deux chiffres et grands nombres.",ar:"ضرب بأرقام من خانتين وأعداد كبيرة."},
  time:{en:"Time",fr:"Temps",ar:"الوقت"},
  solved:{en:"Solved",fr:"Résolus",ar:"المحلولة"},
  done:{en:"Time!",fr:"Terminé !",ar:"انتهى الوقت!"},
  runAgain:{en:"Run Again",fr:"Recommencer",ar:"أعِد المحاولة"},
  changeTier:{en:"Change Tier",fr:"Changer de niveau",ar:"غيّر المستوى"},
  ranks:[
    {min:28,t:{en:"Lightning Calculator",fr:"Calculateur Éclair",ar:"حاسِب البرق"},d:{en:"Astonishing speed.",fr:"Une vitesse stupéfiante.",ar:"سرعة مذهلة."}},
    {min:20,t:{en:"Master Reckoner",fr:"Maître du Calcul",ar:"خبير الحساب"},d:{en:"Rapid and reliable.",fr:"Rapide et fiable.",ar:"سريع وموثوق."}},
    {min:13,t:{en:"Quick Adept",fr:"Adepte Rapide",ar:"متمكّن سريع"},d:{en:"A little more drilling and you fly.",fr:"Encore un peu d'entraînement et vous volerez.",ar:"قليلٌ من التمرين وستنطلق."}},
    {min:7,t:{en:"Steady Apprentice",fr:"Apprenti Régulier",ar:"مبتدئ ثابت"},d:{en:"A solid foundation.",fr:"Une base solide.",ar:"أساس متين."}},
    {min:0,t:{en:"Fresh Recruit",fr:"Nouvelle Recrue",ar:"مستجِدّ"},d:{en:"Run it again and watch the count climb.",fr:"Recommencez et regardez le compte grimper.",ar:"أعِد المحاولة وراقب العدّ يرتفع."}}
  ]
};
var DURATION=60,app=document.getElementById('app'),st=null,timer=null;
function ri(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
function gen(level){var a,b,op,ans;function pick(arr){return arr[Math.floor(Math.random()*arr.length)];}
  if(level==='apprentice'){op=pick(['+','-','×']);if(op==='×'){a=ri(2,9);b=ri(2,9);ans=a*b;}else if(op==='+'){a=ri(2,20);b=ri(2,20);ans=a+b;}else{a=ri(5,20);b=ri(1,a);ans=a-b;}}
  else if(level==='adept'){op=pick(['+','-','×','÷']);if(op==='×'){a=ri(3,12);b=ri(3,12);ans=a*b;}else if(op==='÷'){b=ri(2,12);ans=ri(2,12);a=b*ans;}else if(op==='+'){a=ri(10,60);b=ri(10,60);ans=a+b;}else{a=ri(20,80);b=ri(5,a);ans=a-b;}}
  else{op=pick(['+','-','×','÷']);if(op==='×'){a=ri(11,29);b=ri(3,9);ans=a*b;}else if(op==='÷'){b=ri(3,15);ans=ri(4,16);a=b*ans;}else if(op==='+'){a=ri(40,180);b=ri(40,180);ans=a+b;}else{a=ri(60,200);b=ri(20,a);ans=a-b;}}
  return {txt:a+' '+op+' '+b,ans:ans};}
function home(){if(timer)clearInterval(timer);st=null;
  app.innerHTML='<div class="view"><div class="eyebrow">'+tr(G.sprint)+'</div><div class="gtitle">'+t("g_arith")+'</div>'+
   '<div class="rule"><span class="ln"></span><span class="dot">✦</span><span class="ln"></span></div>'+
   '<p class="tagline">'+tr(G.intro)+'</p><div class="eyebrow" style="margin-bottom:14px">'+tr(G.choose)+'</div>'+
   '<div class="levels">'+
   '<button class="lvl" data-l="apprentice"><div><h3>'+tr(G.l1)+'</h3><p>'+tr(G.d1)+'</p></div><span class="ar">→</span></button>'+
   '<button class="lvl" data-l="adept"><div><h3>'+tr(G.l2)+'</h3><p>'+tr(G.d2)+'</p></div><span class="ar">→</span></button>'+
   '<button class="lvl" data-l="master"><div><h3>'+tr(G.l3)+'</h3><p>'+tr(G.d3)+'</p></div><span class="ar">→</span></button></div>'+
   '<a class="backlink" href="../index.html">← '+t("back")+'</a></div>';
  app.querySelectorAll('.lvl').forEach(function(b){b.onclick=function(){start(b.dataset.l);};});}
function start(level){st={level:level,score:0,time:DURATION,cur:gen(level),buf:''};play();
  timer=setInterval(function(){st.time--;tick();if(st.time<=0){clearInterval(timer);results();}},1000);}
function play(){
  app.innerHTML='<div class="view"><div class="phead"><span>'+tr(G.solved)+' <b id="sc">0</b></span><span class="t">'+tr(G.time)+' <b id="tm">'+st.time+'s</b></span></div>'+
   '<div class="bar"><i id="bar" style="width:100%"></i></div><div class="problem" id="prob">'+st.cur.txt+' =</div>'+
   '<input class="answer" id="ans" inputmode="none" readonly placeholder="?"><div class="pad" id="pad"></div>'+
   '<a class="backlink" href="../index.html">← '+t("back")+'</a></div>';
  var pad=app.querySelector('#pad'),keys=['1','2','3','4','5','6','7','8','9','±','0','⌫'];
  keys.forEach(function(k){var b=document.createElement('button');b.textContent=k;if(k==='⌫'||k==='±')b.className='act';b.onclick=function(){key(k);};pad.appendChild(b);});
  document.onkeydown=function(e){if(e.key>='0'&&e.key<='9')key(e.key);else if(e.key==='Backspace')key('⌫');else if(e.key==='-')key('±');};
  render();}
function key(k){if(k==='⌫')st.buf=st.buf.slice(0,-1);else if(k==='±')st.buf=st.buf.charAt(0)==='-'?st.buf.slice(1):'-'+st.buf;else st.buf+=k;render();check();}
function render(){var a=app.querySelector('#ans');if(a)a.value=st.buf||'';}
function tick(){var tm=app.querySelector('#tm');if(tm)tm.textContent=st.time+'s';var bar=app.querySelector('#bar');if(bar)bar.style.width=(st.time/DURATION*100)+'%';}
function check(){if(st.buf===''||st.buf==='-')return;if(parseInt(st.buf,10)===st.cur.ans){st.score++;var a=app.querySelector('#ans');if(a){a.classList.add('flash-ok');setTimeout(function(){a.classList.remove('flash-ok');},160);}next();app.querySelector('#sc').textContent=st.score;}}
function next(){st.cur=gen(st.level);st.buf='';var p=app.querySelector('#prob');if(p)p.textContent=st.cur.txt+' =';render();}
function results(){document.onkeydown=null;
  var r=G.ranks.find(function(x){return st.score>=x.min;});
  var isBest=Curiosa.saveScore('arithmetic',st.score);
  app.innerHTML='<div class="view"><div class="res-title">'+tr(G.done)+'</div>'+
   (isBest?'<div class="newbest">'+t("newBest")+'</div>':'')+
   '<div class="rank">'+tr(r.t)+'</div><div class="scorebig">'+st.score+'<small> '+t("unit_solved")+'</small></div>'+
   '<p class="res-sub">'+tr(r.d)+'</p>'+
   '<div class="res-actions"><button class="btn" id="again">'+tr(G.runAgain)+'</button><button class="btn ghost" id="menu">'+tr(G.changeTier)+'</button></div>'+
   '<a class="backlink" href="../index.html">← '+t("back")+'</a></div>';
  app.querySelector('#again').onclick=function(){start(st.level);};app.querySelector('#menu').onclick=home;}
home();
</script>
</body>
</html>
